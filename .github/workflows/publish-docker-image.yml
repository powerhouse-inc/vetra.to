name: Build and Publish Docker Image

on:
  push:
    branches:
      - staging
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  HARBOR_REGISTRY: cr.vetra.io
  HARBOR_IMAGE: cr.vetra.io/vetra/vetra-to
  K8S_REPO: powerhouse-inc/powerhouse-k8s-hosting

jobs:
  vetra-to:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.sha-tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate image tag
        id: meta
        env:
          GIT_SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
        run: |
          SHA_SHORT="${GIT_SHA:0:7}"
          echo "sha-tag=${BRANCH}-${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PATNAME }}

      - name: Log in to Harbor Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.ref_name }}
            ${{ env.REGISTRY }}/${{ github.repository }}:${{ steps.meta.outputs.sha-tag }}
            ${{ env.HARBOR_IMAGE }}:${{ github.ref_name }}
            ${{ env.HARBOR_IMAGE }}:${{ steps.meta.outputs.sha-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            TAG=${{ github.ref_name }}

  update-k8s:
    needs: vetra-to
    if: github.ref_name == 'staging'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout k8s repo
        uses: actions/checkout@v5
        with:
          repository: ${{ env.K8S_REPO }}
          token: ${{ secrets.PATNAME }}
          ref: main

      - name: Update staging image tag
        env:
          NEW_TAG: ${{ needs.vetra-to.outputs.image-tag }}
        run: |
          sed -i '/^app:/,/^[a-z]/{/^  image:/,/tag:/{s/tag: .*/tag: '"$NEW_TAG"'/}}' tenants/staging/powerhouse-values.yaml
          echo "Updated app.image.tag to ${NEW_TAG}"
          grep -A3 "repository: cr.vetra.io/vetra/vetra-to" tenants/staging/powerhouse-values.yaml

      - name: Commit and push
        env:
          NEW_TAG: ${{ needs.vetra-to.outputs.image-tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tenants/staging/powerhouse-values.yaml
          git commit -m "chore(staging): update vetra-to image to ${NEW_TAG}"
          git push
