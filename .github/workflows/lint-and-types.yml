name: Lint and Type Check

on:
  workflow_dispatch:
  push:
    branches: ['main', 'staging', 'dev']
  pull_request:
    branches: ['main', 'staging', 'dev']
    types: [opened, synchronize]

jobs:
  lint-and-types:
    name: Lint and Types Checks
    runs-on: ubuntu-latest
    container: node:24

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PNPM
        uses: pnpm/action-setup@v3
        with:
          version: 10
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Code Format
        run: pnpm run format:check

      - name: Type check
        run: pnpm tsc
